id = "ds-language-server"
name = "Design System Language Server"
version = "0.1.0"
schema_version = 1
description = "IntelliSense for design system components, tokens, and utility classes with lifecycle-aware deprecation diagnostics."
repository = "https://github.com/Mmmgnus/ds-foundation"
authors = ["Magnus Fredlundh"]

[lib]
kind = "Rust"
version = "0.7.0"

[language_servers.ds-language-server]
languages = ["HTML", "CSS", "SCSS", "JavaScript", "TypeScript", "TSX", "JSX"]

[language_servers.ds-language-server.language_ids]
HTML = "html"
CSS = "css"
SCSS = "scss"
JavaScript = "javascript"
TypeScript = "typescript"
TSX = "typescriptreact"
JSX = "javascriptreact"
