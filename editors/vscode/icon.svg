<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Background -->
  <rect width="256" height="256" rx="24" fill="#1a1a2e"/>
  
  <!-- Subtle grid pattern suggesting design tokens -->
  <g opacity="0.08">
    <rect x="20" y="20" width="28" height="28" rx="4" fill="white"/>
    <rect x="56" y="20" width="28" height="28" rx="4" fill="white"/>
    <rect x="20" y="56" width="28" height="28" rx="4" fill="white"/>
    <rect x="20" y="208" width="28" height="28" rx="4" fill="white"/>
    <rect x="208" y="20" width="28" height="28" rx="4" fill="white"/>
    <rect x="208" y="208" width="28" height="28" rx="4" fill="white"/>
  </g>
  
  <!-- "D" letter -->
  <path d="M48 80 h20 c30 0 50 18 50 48 s-20 48 -50 48 h-20 z M68 96 v64 h6 c20 0 32-12 32-32 s-12-32-32-32 z" 
        fill="url(#grad1)"/>
  
  <!-- "S" letter -->
  <path d="M152 96 c0-10 10-18 26-18 c14 0 24 6 28 14 l-12 8 c-3-6-9-8-16-8 c-8 0-12 3-12 8 c0 6 6 8 18 12 c16 5 26 12 26 26 c0 16-14 26-30 26 c-18 0-30-8-34-20 l14-8 c3 8 10 14 20 14 c10 0 14-4 14-10 c0-7-6-10-18-14 c-16-5-24-12-24-24 z" 
        fill="url(#grad2)"/>
  
  <!-- Angle bracket accent < /> -->
  <g opacity="0.6">
    <path d="M100 190 l-14 10 l14 10" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M120 186 l-8 28" stroke="#888" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M132 190 l14 10 l-14 10" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
</svg>
